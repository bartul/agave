version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    groups:
      aspire:
        patterns:
          - "Aspire*"
      orleans:
        patterns:
          - "Microsoft.Orleans.*"
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      opentelemetry:
        patterns:
          - "OpenTelemetry.*"
      test:
        patterns:
          - "xunit*"
          - "coverlet*"
          - "Microsoft.NET.Test.Sdk"
          - "GitHubActionsTestLogger"
